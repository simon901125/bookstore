    <script>
      const MEMBER_JSON_URL = "../../python/member.json";
      const REGISTER_API_URL = "../../api/register";
      const MEMBER_STORAGE_KEY = "froggyMembers";
      const CURRENT_MEMBER_KEY = "froggyCurrentMember";
      const COMMON_EMAIL_DOMAINS = new Set([
        "gmail.com",
        "yahoo.com",
        "yahoo.com.tw",
        "hotmail.com",
        "outlook.com",
        "icloud.com",
        "msn.com",
        "live.com",
        "protonmail.com",
        "mail.com",
        "pchome.com.tw",
        "seed.net.tw",
        "hinet.net",
      ]);
      const TAIWAN_CITIES = [
        "台北市",
        "臺北市",
        "新北市",
        "桃園市",
        "台中市",
        "臺中市",
        "台南市",
        "臺南市",
        "高雄市",
        "基隆市",
        "新竹市",
        "新竹縣",
        "苗栗縣",
        "彰化縣",
        "南投縣",
        "雲林縣",
        "嘉義市",
        "嘉義縣",
        "屏東縣",
        "宜蘭縣",
        "花蓮縣",
        "台東縣",
        "臺東縣",
        "澎湖縣",
        "金門縣",
        "連江縣",
      ];

      function getStoredMembers() {
        try {
          return JSON.parse(localStorage.getItem(MEMBER_STORAGE_KEY) || "[]");
        } catch {
          return [];
        }
      }

      function saveStoredMembers(members) {
        localStorage.setItem(MEMBER_STORAGE_KEY, JSON.stringify(members));
      }

      async function getSeedMembers() {
        try {
          const response = await fetch(MEMBER_JSON_URL, { cache: "no-store" });
          if (!response.ok) return [];
          const data = await response.json();
          return Array.isArray(data) ? data : [];
        } catch {
          return [];
        }
      }

      async function getAllMembers() {
        const seedMembers = await getSeedMembers();
        return seedMembers;
      }

      function showRegisterMessage(message, type = "error") {
        let box = document.getElementById("registerMessage");
        if (!box) {
          box = document.createElement("div");
          box.id = "registerMessage";
          box.setAttribute("role", "alert");
          box.setAttribute("tabindex", "-1");
          box.className = "rounded px-4 py-3 text-sm font-body";
          document.getElementById("registerForm")?.prepend(box);
        }
        box.className =
          type === "success"
            ? "rounded px-4 py-3 text-sm font-body bg-green-50 text-green-700"
            : "rounded px-4 py-3 text-sm font-body bg-error-container text-on-error-container";
        box.textContent = message;

        if (type !== "success") {
          const topOffset = 110;
          const targetTop =
            box.getBoundingClientRect().top + window.pageYOffset - topOffset;
          window.scrollTo({ top: Math.max(targetTop, 0), behavior: "smooth" });
          window.setTimeout(() => box.focus({ preventScroll: true }), 250);
        }
      }

      function reportRegisterError(fieldId, message) {
        showRegisterMessage(message);
        const field = document.getElementById(fieldId);
        if (field) {
          field.setAttribute("aria-invalid", "true");
          field.classList.add("ring-2", "ring-red-500", "bg-red-50");
        }
      }

      function clearRegisterErrors() {
        document
          .querySelectorAll("#registerForm [aria-invalid='true']")
          .forEach((field) => {
            field.removeAttribute("aria-invalid");
            field.classList.remove("ring-2", "ring-red-500", "bg-red-50");
          });
      }

      function showRegisterSuccessModal() {
        const modal = document.getElementById("registerSuccessModal");
        const button = document.getElementById("registerSuccessHomeButton");
        modal?.classList.remove("hidden");
        modal?.classList.add("flex");
        document.body.classList.add("overflow-hidden");
        window.setTimeout(() => button?.focus(), 100);
      }

      function goHomeAndOpenLogin() {
        window.location.href = "../froggy_main/mainscreen.html?login=1";
      }

      function fieldValue(id) {
        return document.getElementById(id)?.value.trim() || "";
      }

      function selectedGender() {
        return document.querySelector('input[name="gender"]:checked')?.value || "";
      }

      function validateEmail(email) {
        const match = email
          .toLowerCase()
          .match(/^[a-z0-9._%+-]+@([a-z0-9.-]+\.[a-z]{2,})$/);
        return Boolean(match && COMMON_EMAIL_DOMAINS.has(match[1]));
      }

      function validatePassword(password) {
        return (
          /^[A-Za-z0-9]{1,20}$/.test(password) &&
          /[A-Z]/.test(password) &&
          /[a-z]/.test(password) &&
          /\d/.test(password)
        );
      }

      function validateNickname(nickname) {
        return nickname.length > 0 && Array.from(nickname).length <= 20;
      }

      function validatePhone(phone) {
        return /^09\d{8}$/.test(phone);
      }

      function validateTaiwanAddress(address) {
        const taiwanCities = [
          "\u53f0\u5317\u5e02",
          "\u65b0\u5317\u5e02",
          "\u6843\u5712\u5e02",
          "\u53f0\u4e2d\u5e02",
          "\u53f0\u5357\u5e02",
          "\u9ad8\u96c4\u5e02",
          "\u57fa\u9686\u5e02",
          "\u65b0\u7af9\u5e02",
          "\u5609\u7fa9\u5e02",
          "\u65b0\u7af9\u7e23",
          "\u82d7\u6817\u7e23",
          "\u5f70\u5316\u7e23",
          "\u5357\u6295\u7e23",
          "\u96f2\u6797\u7e23",
          "\u5609\u7fa9\u7e23",
          "\u5c4f\u6771\u7e23",
          "\u5b9c\u862d\u7e23",
          "\u82b1\u84ee\u7e23",
          "\u53f0\u6771\u7e23",
          "\u6f8e\u6e56\u7e23",
          "\u91d1\u9580\u7e23",
          "\u9023\u6c5f\u7e23",
        ];
        const hasCity = taiwanCities.some((city) => address.includes(city));
        const hasDistrict = /[^\s]+(\u5340|\u9109|\u93ae|\u5e02)/.test(address);
        const hasStreet = /(\u8def|\u8857|\u5927\u9053|\u5df7|\u5f04)/.test(address);
        const hasNumber = /\d+\u865f/.test(address);
        return hasCity && hasDistrict && hasStreet && hasNumber;
      }

      function buildMember() {
        return {
          email: fieldValue("email").toLowerCase(),
          password: fieldValue("password"),
          nickname: fieldValue("nickname"),
          gender: selectedGender(),
          birthday: fieldValue("birthday"),
          phone: fieldValue("phone"),
          address: fieldValue("address"),
          securityQuestion: fieldValue("security-question"),
          securityAnswer: fieldValue("security-answer"),
        };
      }

      async function registerMember(member) {
        const response = await fetch(REGISTER_API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify(member),
        });

        let result = {};
        try {
          result = await response.json();
        } catch {
          result = {};
        }

        if (!response.ok || !result.ok) {
          throw new Error(
            result.message ||
              "\u7121\u6cd5\u5beb\u5165\u6703\u54e1\u6a94\uff0c\u8acb\u78ba\u8a8d\u5df2\u4f7f\u7528 python server.py \u555f\u52d5\u7db2\u7ad9\u3002"
          );
        }

        return result.member;
      }

      async function handleRegisterSubmit(event) {
        event.preventDefault();
        const member = buildMember();
        const confirmPassword = fieldValue("confirm-password");

        if (!validateEmail(member.email)) {
          showRegisterMessage("電子郵件格式不正確，且目前僅接受常用信箱網域，例如 gmail、yahoo、hotmail、outlook、icloud。");
          return;
        }

        const members = await getAllMembers();
        if (members.some((item) => String(item.email).toLowerCase() === member.email)) {
          showRegisterMessage("此電子郵件已註冊，請改用其他帳號或直接登入。");
          return;
        }

        if (!validatePassword(member.password)) {
          showRegisterMessage("密碼需包含大小寫英文字母與數字，最多 20 位，且不可包含符號。");
          return;
        }

        if (member.password !== confirmPassword) {
          showRegisterMessage("兩次輸入的密碼不一致。");
          return;
        }

        if (!validateNickname(member.nickname)) {
          showRegisterMessage("暱稱不可空白，且不可超過 20 字。");
          return;
        }

        if (!member.gender || !member.birthday) {
          showRegisterMessage("請完整填寫性別與生日。");
          return;
        }

        if (!validatePhone(member.phone)) {
          showRegisterMessage("連絡電話需為 09 開頭的 10 碼手機號碼。");
          return;
        }

        if (!validateTaiwanAddress(member.address)) {
          showRegisterMessage("地址需為完整台灣地址，請包含縣市、區鄉鎮市、路街巷弄與門牌號。");
          return;
        }

        if (!member.securityQuestion || !member.securityAnswer) {
          showRegisterMessage("請選擇安全性問題並填寫答案。");
          return;
        }

        try {
          const savedMember = await registerMember(member);
          localStorage.setItem(
            CURRENT_MEMBER_KEY,
            JSON.stringify({ email: savedMember.email, nickname: savedMember.nickname })
          );
          showRegisterMessage(
            "\u8a3b\u518a\u6210\u529f\uff0c\u6703\u54e1\u8cc7\u6599\u5df2\u5beb\u5165 member.json\uff0c\u6b63\u5728\u524d\u5f80\u767b\u5165\u9801\u3002",
            "success"
          );
          window.setTimeout(() => {
            window.location.href = "../../window_jp/froggy_login/login.html";
          }, 900);
        } catch (error) {
          showRegisterMessage(error.message);
        }
        return;

        const storedMembers = getStoredMembers();
        storedMembers.push(member);
        saveStoredMembers(storedMembers);
        localStorage.setItem(CURRENT_MEMBER_KEY, JSON.stringify({ email: member.email }));
        showRegisterMessage("註冊成功，會員資料已保存。即將前往登入頁。", "success");
        window.setTimeout(() => {
          window.location.href = "../../window_jp/froggy_login/login.html";
        }, 900);
      }

      async function handleRegisterSubmit(event) {
        event.preventDefault();
        clearRegisterErrors();

        const member = buildMember();
        const confirmPassword = fieldValue("confirm-password");

        if (!validateEmail(member.email)) {
          reportRegisterError(
            "email",
            "電子郵件不符合規定：請輸入有效信箱，且需使用常見信箱網域，例如 gmail、yahoo、hotmail、outlook 或 icloud。"
          );
          return;
        }

        const members = await getAllMembers();
        if (members.some((item) => String(item.email).toLowerCase() === member.email)) {
          reportRegisterError("email", "電子郵件不符合規定：此帳號已經註冊過。");
          return;
        }

        if (!validatePassword(member.password)) {
          reportRegisterError(
            "password",
            "密碼不符合規定：需包含大寫英文、小寫英文與數字，最多 20 位，且不可使用符號。"
          );
          return;
        }

        if (member.password !== confirmPassword) {
          reportRegisterError("confirm-password", "確認密碼不符合規定：兩次輸入的密碼不一致。");
          return;
        }

        if (!validateNickname(member.nickname)) {
          reportRegisterError("nickname", "暱稱不符合規定：不可空白，且最多 20 字。");
          return;
        }

        if (!member.gender) {
          showRegisterMessage("性別不符合規定：請選擇性別。");
          return;
        }

        if (!member.birthday) {
          reportRegisterError("birthday", "生日不符合規定：請選擇生日。");
          return;
        }

        if (!validatePhone(member.phone)) {
          reportRegisterError("phone", "聯絡電話不符合規定：請輸入 09 開頭的 10 碼手機號碼。");
          return;
        }

        if (members.some((item) => String(item.phone).trim() === member.phone)) {
          reportRegisterError("phone", "聯絡電話不符合規定：此電話號碼已被其他帳號使用。");
          return;
        }

        if (!validateTaiwanAddress(member.address)) {
          reportRegisterError(
            "address",
            "完整地址不符合規定：請輸入台灣地址，且需包含縣市、區/鄉/鎮/市、路/街/大道/巷/弄與門牌號。"
          );
          return;
        }

        if (!member.securityQuestion) {
          reportRegisterError("security-question", "安全性問題不符合規定：請選擇一個安全性問題。");
          return;
        }

        if (!member.securityAnswer) {
          reportRegisterError("security-answer", "安全性問題回答不符合規定：請輸入回答。");
          return;
        }

        try {
          const savedMember = await registerMember(member);
          localStorage.setItem(
            CURRENT_MEMBER_KEY,
            JSON.stringify({ email: savedMember.email, nickname: savedMember.nickname })
          );
          showRegisterSuccessModal();
        } catch (error) {
          showRegisterMessage(error.message);
        }
      }

      document
        .getElementById("registerSuccessHomeButton")
        ?.addEventListener("click", goHomeAndOpenLogin);

      document
        .getElementById("registerForm")
        ?.addEventListener("submit", handleRegisterSubmit);
    </script>
  </body>
