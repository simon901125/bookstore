<script>
const CART_STORAGE_KEY = "froggyCartItems";

function getCartItems() {
  try {
    return JSON.parse(localStorage.getItem(CART_STORAGE_KEY) || "[]");
  } catch {
    return [];
  }
}

function saveCartItems(items) {
  localStorage.setItem(CART_STORAGE_KEY, JSON.stringify(items));
}

function formatPrice(price) {
  return `$${Number(price || 0).toLocaleString("zh-TW")}`;
}

function cartListElement() {
  return document.querySelector(".lg\\:col-span-8.space-y-12");
}

function cartSummaryElement() {
  return document.querySelector("aside.lg\\:col-span-4");
}

function itemTotal(item) {
  return Number(item.finalPrice || item.price || 0) * Number(item.quantity || 1);
}

function itemStock(item) {
  return Math.max(0, Number(item.stock || 0));
}

function renderEmptyCart(list, summary) {
  list.innerHTML = `
    <div class="bg-surface-container-lowest p-12 rounded-xl shadow-sm text-center">
      <span class="material-symbols-outlined text-5xl text-on-surface-variant/40 mb-4">shopping_bag</span>
      <h2 class="text-3xl font-headline italic text-primary mb-3">購物車是空的</h2>
      <p class="font-body text-sm text-on-surface-variant mb-8">請從書籍詳情頁加入想購買的書籍。</p>
      <a class="inline-flex bg-primary text-on-primary px-8 py-4 rounded-lg font-label text-xs uppercase tracking-widest hover:bg-secondary transition-colors" href="../froggy_main/mainscreen.html">回到首頁</a>
    </div>
  `;

  summary.innerHTML = `
    <div class="bg-primary text-surface p-10 rounded-xl">
      <h2 class="text-3xl font-headline italic mb-8">訂單摘要</h2>
      <div class="space-y-4 font-label text-sm uppercase tracking-widest">
        <div class="flex justify-between border-b border-surface/10 pb-4">
          <span class="opacity-70">商品數量</span>
          <span>0</span>
        </div>
        <div class="flex justify-between border-b border-surface/10 pb-4">
          <span class="opacity-70">小計</span>
          <span>${formatPrice(0)}</span>
        </div>
      </div>
      <div class="flex justify-between items-end mt-12 mb-10">
        <span class="font-label text-xs uppercase tracking-[0.2em] opacity-60">總計</span>
        <span class="text-4xl font-headline">${formatPrice(0)}</span>
      </div>
      <button class="w-full bg-secondary/50 text-surface py-5 rounded-lg font-label text-xs uppercase tracking-[0.2em] font-bold cursor-not-allowed" disabled>前往結帳</button>
    </div>
  `;
}

function createCartItem(item) {
  const row = document.createElement("div");
  row.className =
    "flex flex-col md:flex-row gap-4 md:gap-8 bg-surface-container-lowest p-6 rounded-xl shadow-sm items-start md:items-stretch";

  const originalPrice = Number(item.price || 0);
  const finalPrice = Number(item.finalPrice || item.price || 0);
  const hasDiscount = finalPrice < originalPrice;
  const stock = itemStock(item);
  const quantity = Math.min(Number(item.quantity || 1), Math.max(stock, 1));
  const reachedStockLimit = stock > 0 && quantity >= stock;

  row.innerHTML = `
    <div class="w-full md:w-40 aspect-[3/4] overflow-hidden rounded-lg bg-surface-container-high shrink-0">
      <img alt="${item.title || "Book cover"}" class="w-full h-full object-cover" src="${item.coverUrl || "../../bookstore_DB/bookPicture/getImage.png"}"/>
    </div>
    <div class="flex-1 flex flex-col justify-between py-2">
      <div class="flex justify-between items-start gap-6">
        <div>
          <a href="../froggy_bookPage/bookPage.html?isbn=${encodeURIComponent(item.isbn)}">
            <h3 class="text-2xl font-headline italic text-primary hover:text-secondary transition-colors">${item.title || "Untitled"}</h3>
          </a>
          <p class="font-label text-sm text-on-surface-variant mt-1">${item.author || "Unknown author"}</p>
          <p class="font-label text-xs text-on-surface-variant mt-3">庫存 ${stock} 本</p>
          ${item.promotionLabel ? `<p class="font-label text-xs text-secondary mt-4 uppercase tracking-tighter font-bold">${item.promotionLabel}</p>` : ""}
        </div>
        <div class="text-right shrink-0">
          ${hasDiscount ? `<div class="text-sm font-label text-on-surface-variant line-through mb-1">${formatPrice(originalPrice)}</div>` : ""}
          <div class="text-xl font-headline text-primary">${formatPrice(finalPrice)}</div>
        </div>
      </div>
      <div class="flex items-center justify-between mt-8">
        <div class="flex items-center bg-surface-container-low rounded-full px-4 py-1 gap-4">
          <button data-cart-action="decrease" class="material-symbols-outlined text-sm text-on-surface-variant hover:text-primary transition-colors" type="button">remove</button>
          <span class="font-label text-sm font-bold w-4 text-center">${quantity}</span>
          <button data-cart-action="increase" class="material-symbols-outlined text-sm transition-colors ${reachedStockLimit ? "text-on-surface-variant/30 cursor-not-allowed" : "text-on-surface-variant hover:text-primary"}" type="button" ${reachedStockLimit ? "disabled" : ""}>add</button>
        </div>
        ${reachedStockLimit ? '<span class="font-label text-[10px] text-error uppercase tracking-widest">已達庫存上限</span>' : ""}
        <button data-cart-action="remove" class="flex items-center gap-2 font-label text-xs uppercase tracking-widest text-error opacity-60 hover:opacity-100 transition-opacity" type="button">
          <span class="material-symbols-outlined text-sm">delete</span>
          移除
        </button>
      </div>
    </div>
  `;

  row.querySelector('[data-cart-action="increase"]').addEventListener("click", () => updateQuantity(item.isbn, 1));
  row.querySelector('[data-cart-action="decrease"]').addEventListener("click", () => updateQuantity(item.isbn, -1));
  row.querySelector('[data-cart-action="remove"]').addEventListener("click", () => removeCartItem(item.isbn));
  return row;
}

function updateQuantity(isbn, delta) {
  const items = getCartItems()
    .map((item) =>
      item.isbn === isbn
        ? {
            ...item,
            quantity: Math.min(
              Math.max(1, Number(item.quantity || 1) + delta),
              Math.max(itemStock(item), 1),
            ),
          }
        : item,
    );
  saveCartItems(items);
  renderCart();
}

function removeCartItem(isbn) {
  saveCartItems(getCartItems().filter((item) => item.isbn !== isbn));
  renderCart();
}

function normalizeCartItems(items) {
  return items.map((item) => {
    const stock = itemStock(item);
    return {
      ...item,
      quantity: Math.min(
        Math.max(1, Number(item.quantity || 1)),
        Math.max(stock, 1),
      ),
    };
  });
}

function renderSummary(summary, items) {
  const totalQuantity = items.reduce((sum, item) => sum + Number(item.quantity || 1), 0);
  const total = items.reduce((sum, item) => sum + itemTotal(item), 0);

  summary.innerHTML = `
    <div class="bg-primary text-surface p-10 rounded-xl">
      <h2 class="text-3xl font-headline italic mb-8">訂單摘要</h2>
      <div class="space-y-4 font-label text-sm uppercase tracking-widest">
        <div class="flex justify-between border-b border-surface/10 pb-4">
          <span class="opacity-70">商品種類</span>
          <span>${items.length}</span>
        </div>
        <div class="flex justify-between border-b border-surface/10 pb-4">
          <span class="opacity-70">商品數量</span>
          <span>${totalQuantity}</span>
        </div>
        <div class="flex justify-between border-b border-surface/10 pb-4">
          <span class="opacity-70">小計</span>
          <span>${formatPrice(total)}</span>
        </div>
      </div>
      <div class="flex justify-between items-end mt-12 mb-10">
        <span class="font-label text-xs uppercase tracking-[0.2em] opacity-60">總計</span>
        <span class="text-4xl font-headline">${formatPrice(total)}</span>
      </div>
      <button id="checkout-btn" class="w-full bg-secondary text-surface py-5 rounded-lg font-label text-xs uppercase tracking-[0.2em] font-bold shadow-2xl hover:scale-[1.02] active:scale-95 transition-transform flex items-center justify-center gap-3">
        前往結帳
        <span class="material-symbols-outlined text-sm">arrow_forward</span>
      </button>
    </div>
  `;

  document.getElementById('checkout-btn').addEventListener('click', async () => {
    const currentMember = FroggyAuth.getCurrentMember();
    if (!currentMember) {
      alert('請先登入後再進行結帳。');
      window.location.href = '../../window_jp/froggy_login/login.html?return=' + encodeURIComponent(window.location.href);
      return;
    }

    try {
      // Get member details for address, phone, and recipient
      const memberResp = await fetch('/python/member.json', { cache: 'no-store' });
      const members = await memberResp.json();
      const member = members.find(m => m.email.toLowerCase() === currentMember.email.toLowerCase());
      
      const orderData = {
        email: currentMember.email,
        items: items,
        totalAmount: total,
        recipient: member ? member.nickname : currentMember.nickname,
        phone: member ? member.phone : '',
        address: member ? (member.address || '') : ''
      };

      const response = await fetch('/api/orders', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(orderData)
      });

      const result = await response.json();
      if (result.ok) {
        alert('訂單已成功建立！');
        saveCartItems([]); // Clear cart
        window.location.href = '../froggy_order/order.html';
      } else {
        alert('建立訂單失敗：' + result.message);
      }
    } catch (error) {
      console.error('Checkout error:', error);
      alert('伺服器連線失敗，請稍後再試。');
    }
  });
}

async function renderCart() {
  const list = cartListElement();
  const summary = cartSummaryElement();
  if (!list || !summary) return;

  let items = getCartItems();
  
  try {
    // Fetch latest stock from server
    const response = await fetch('/python/books.json', { cache: 'no-store' });
    if (response.ok) {
      const latestBooks = await response.json();
      // Update local items with latest stock
      items = items.map(item => {
        const latestBook = latestBooks.find(b => b.isbn === item.isbn);
        if (latestBook) {
          return {
            ...item,
            stock: latestBook.stock,
            price: latestBook.price,
            finalPrice: getDiscountedPrice(latestBook),
            promotionLabel: latestBook.promotionLabel || ""
          };
        }
        return item;
      });
    }
  } catch (error) {
    console.error('Failed to sync stock:', error);
  }

  items = normalizeCartItems(items);
  saveCartItems(items);
  list.replaceChildren();

  if (!items.length) {
    renderEmptyCart(list, summary);
    return;
  }

  list.replaceChildren(...items.map(createCartItem));
  renderSummary(summary, items);
}

renderCart();
</script>
