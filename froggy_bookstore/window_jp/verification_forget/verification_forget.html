  <body
    class="font-body bg-surface h-full flex items-center justify-center relative overflow-hidden"
  >
    <!-- Background Layer with Overlay -->
    <div
      class="absolute inset-0 z-0 backdrop-image"
      style="
        background-image: url(&quot;https://lh3.googleusercontent.com/aida-public/AB6AXuCvJ7t0lY2h983LUX9aqisG0Kdh9s7Fq9ZtpTZbSL3A6m8J46LFCYuC6DZl9UIGuX5mOMxMR0ZA0biv5PVUusYm6z5D3HJvsySF1xv-YVXG5cY1coHKeHLK2BeFljJ9Gl6RcF77KEYy3-bR9GjmOh3QUBGAX5pXJeurKtyrl0Eba0msBXRZrO5LmD5Z69x4d8UpZtTbWeRWFAliLc3Uu2No5OyXvwTYEfYCwybSCibEfyqMABkN2xvs_Yv7arKTswlg-Efv3LjFAiBr&quot;);
        background-size: cover;
        background-position: center;
        filter: blur(8px) brightness(0.9);
      "
    ></div>
    <div class="absolute inset-0 z-0 bg-surface/70 backdrop-blur-sm"></div>
    <!-- Central Verification Dialog -->
    <div
      class="relative z-10 w-full max-w-md mx-4 overflow-hidden rounded-lg shadow-2xl bg-surface-container-lowest flex flex-col border border-outline-variant/15"
    >
      <!-- Header -->
      <div class="bg-primary px-6 py-4 flex justify-between items-center">
        <h2
          class="font-headline text-xl text-on-primary font-medium tracking-wide"
        >
          忘記安全性驗證問題
          <span class="opacity-70 text-sm ml-1"
            >/ FORGOT SECURITY QUESTION</span
          >
        </h2>
        <button
          class="text-on-primary/70 hover:text-on-primary transition-colors focus:outline-none p-1"
        >
          <span class="material-symbols-outlined" data-icon="close">close</span>
        </button>
      </div>
      <!-- Content Area -->
      <div class="px-8 flex flex-col pt-10 pb-0">
        <!-- Prompt Text -->
        <div class="mb-8 text-left">
          <p class="font-body text-on-surface mb-2 text-sm leading-relaxed">
            請輸入您註冊的電子郵件地址，我們將發送驗證連結以協助您重設安全性問題。
          </p>
          <p class="font-body text-on-surface-variant text-sm leading-relaxed">
            Please enter your registered email address to receive a verification
            link to reset your security question.
          </p>
        </div>
        <!-- Input Field -->
        <div class="mb-8">
          <div class="relative">
            <div
              class="absolute inset-y-0 left-0 flex items-center pl-3 text-on-surface-variant"
            >
              <span class="material-symbols-outlined text-xl" data-icon="mail"
                >mail</span
              >
            </div>
            <input
              class="w-full pl-12 pr-4 py-3 bg-surface-container-low border-none rounded focus:ring-0 focus:bg-surface-container-highest transition-all font-body text-on-surface placeholder:text-outline-variant text-sm"
              placeholder="請輸入電子郵件 / Enter Email"
              type="email"
            />
          </div>
        </div>
        <!-- Bottom Actions (Flush with bottom edge, equally sized) -->
        <div
          class="bg-surface-container-low px-8 py-5 flex justify-end items-center gap-4 -mx-8"
        >
          <button
            class="font-body text-sm font-medium text-on-surface-variant hover:text-error transition-colors px-4 py-2"
            type="button"
          >
            取消 / CANCEL
          </button>
          <button
            class="bg-primary text-on-primary font-body text-sm font-medium px-6 py-2.5 rounded transition-all hover:bg-primary-container hover:shadow-md"
            type="submit"
          >
            發送驗證連結 / SEND VERIFICATION LINK
          </button>
        </div>
      </div>
    </div>
    <!-- Decoration / Branding Floating Element -->
  </body>
