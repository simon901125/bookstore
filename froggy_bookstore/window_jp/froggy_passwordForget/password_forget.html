<!doctype html>

<html class="h-full" lang="zh-TW">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Froggy Bookstore - Forgot Password</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary-fixed": "#d6e3ff",
              outline: "#74777f",
              "on-surface": "#1b1c1a",
              "inverse-primary": "#aec7f7",
              "secondary-container": "#ff9a59",
              "on-primary": "#ffffff",
              "tertiary-fixed": "#ffddb9",
              surface: "#fbf9f5",
              tertiary: "#321c00",
              "on-primary-fixed": "#001b3d",
              "on-secondary-fixed-variant": "#743400",
              "error-container": "#ffdad6",
              "on-tertiary-fixed": "#2b1700",
              "surface-variant": "#e4e2de",
              "surface-container-low": "#f5f3ef",
              "primary-fixed-dim": "#aec7f7",
              "outline-variant": "#c4c6cf",
              "secondary-fixed-dim": "#ffb68b",
              "on-primary-container": "#87a0cd",
              "tertiary-fixed-dim": "#f1bd81",
              primary: "#002046",
              secondary: "#96490b",
              "surface-container-highest": "#e4e2de",
              "on-tertiary-fixed-variant": "#623f0f",
              "tertiary-container": "#4f2f00",
              "on-error-container": "#93000a",
              "on-surface-variant": "#44474e",
              "primary-container": "#1b365d",
              "on-secondary-fixed": "#321300",
              error: "#ba1a1a",
              "inverse-on-surface": "#f2f0ed",
              "on-error": "#ffffff",
              "surface-bright": "#fbf9f5",
              "on-tertiary": "#ffffff",
              "surface-tint": "#465f88",
              background: "#fbf9f5",
              "surface-dim": "#dbdad6",
              "surface-container-lowest": "#ffffff",
              "surface-container": "#efeeea",
              "on-primary-fixed-variant": "#2e476f",
              "on-background": "#1b1c1a",
              "inverse-surface": "#30312e",
              "on-tertiary-container": "#c6965e",
              "on-secondary-container": "#723300",
              "on-secondary": "#ffffff",
              "secondary-fixed": "#ffdbc8",
              "surface-container-high": "#eae8e4",
            },
            borderRadius: {
              DEFAULT: "0.125rem",
              lg: "0.25rem",
              xl: "0.5rem",
              full: "0.75rem",
            },
            spacing: {},
            fontFamily: {
              headline: ["Newsreader"],
              display: ["Newsreader"],
              body: ["Manrope"],
              label: ["Manrope"],
            },
            fontSize: {},
          },
        },
      };
    </script>
    <style>
      body {
        font-family: "Manrope", sans-serif;
      }
      h1,
      h2,
      h3,
      h4,
      h5,
      h6,
      .font-newsreader {
        font-family: "Newsreader", serif;
      }
    </style>
  </head>
  <body
    class="h-full bg-background text-on-background antialiased relative overflow-hidden"
  >
    <!-- Blurred Background simulating Homepage -->
    <div
      class="absolute inset-0 z-0 w-full h-full bg-surface-container-low"
      data-alt="Interior of a classic, cozy bookstore with tall wooden shelves filled with old books, warm ambient lighting, slightly blurred"
      style="
        background-image: url(&quot;https://lh3.googleusercontent.com/aida-public/AB6AXuCvJ7t0lY2h983LUX9aqisG0Kdh9s7Fq9ZtpTZbSL3A6m8J46LFCYuC6DZl9UIGuX5mOMxMR0ZA0biv5PVUusYm6z5D3HJvsySF1xv-YVXG5cY1coHKeHLK2BeFljJ9Gl6RcF77KEYy3-bR9GjmOh3QUBGAX5pXJeurKtyrl0Eba0msBXRZrO5LmD5Z69x4d8UpZtTbWeRWFAliLc3Uu2No5OyXvwTYEfYCwybSCibEfyqMABkN2xvs_Yv7arKTswlg-Efv3LjFAiBr&quot;);
        background-size: cover;
        background-position: center;
        filter: blur(8px) brightness(0.9);
      "
    ></div>
    <div class="absolute inset-0 z-0 bg-surface/70 backdrop-blur-sm"></div>
    <!-- Modal Overlay Container -->
    <div
      class="relative z-50 flex items-center justify-center min-h-screen px-4 py-12 sm:px-6 lg:px-8"
    >
      <!-- Modal Dialog -->
      <div
        class="w-full max-w-md bg-surface-container-lowest rounded-lg shadow-[0_12px_40px_rgba(27,28,26,0.15)] overflow-hidden flex flex-col border border-outline-variant/15"
      >
        <!-- Header Bar -->
        <div class="bg-primary px-6 py-4 flex justify-between items-center">
          <h2
            class="font-headline text-xl text-on-primary font-medium tracking-wide"
          >
            忘記密碼
            <span class="opacity-70 text-sm ml-1">/ FORGOT PASSWORD</span>
          </h2>
          <button
            aria-label="Close"
            class="text-on-primary/70 hover:text-on-primary transition-colors focus:outline-none focus:ring-2 focus:ring-on-primary/50 rounded-DEFAULT p-1"
            onclick="goBackToPreviousPage()"
            type="button"
          >
            <span class="material-symbols-outlined" data-icon="close"
              >close</span
            >
          </button>
        </div>
        <!-- Modal Content -->
        <div class="px-8 pt-10 pb-8 flex flex-col">
          <!-- Description -->
          <div id="step-desc" class="mb-8 text-left">
            <p class="font-body text-on-surface mb-2 text-sm leading-relaxed">
              請輸入您註冊的電子郵件帳號以開始密碼重設程序。
            </p>
            <p
              class="font-body text-on-surface-variant text-sm leading-relaxed"
            >
              Please enter your registered email address to start password reset.
            </p>
          </div>

          <!-- Step 1: Email -->
          <div id="section-email" class="space-y-6">
            <div class="relative">
              <div
                class="absolute inset-y-0 left-0 flex items-center pl-3 text-on-surface-variant"
              >
                <span class="material-symbols-outlined text-xl">mail</span>
              </div>
              <input
                class="w-full pl-12 pr-4 py-3 bg-surface-container-low border-none rounded focus:ring-0 focus:bg-surface-container-highest transition-all font-body text-on-surface placeholder:text-outline-variant text-sm"
                id="recovery-email"
                placeholder="請輸入電子郵件 / Enter Email"
                type="email"
              />
            </div>
          </div>

          <!-- Step 2: Security Question -->
          <div id="section-security" class="space-y-6 hidden">
             <div class="space-y-4">
              <div class="p-4 bg-primary/5 rounded-lg border border-primary/10">
                <p class="text-[10px] uppercase tracking-widest text-primary font-bold mb-1">您的安全提問：</p>
                <p id="display-question" class="font-headline text-lg text-primary italic">...</p>
              </div>
              <div class="relative">
                <div class="absolute inset-y-0 left-0 flex items-center pl-3 text-on-surface-variant">
                  <span class="material-symbols-outlined text-xl">key</span>
                </div>
                <input
                  class="w-full pl-12 pr-4 py-3 bg-surface-container-low border-none rounded focus:ring-0 focus:bg-surface-container-highest transition-all font-body text-on-surface placeholder:text-outline-variant text-sm"
                  id="security-answer"
                  placeholder="輸入答案 / Your Answer"
                  type="text"
                />
              </div>
            </div>
          </div>

          <!-- Step 3: New Password -->
          <div id="section-newpwd" class="space-y-6 hidden">
            <div class="space-y-4">
              <div class="space-y-2">
                <label class="block font-body text-[10px] font-bold uppercase tracking-widest text-on-surface-variant/60 ml-1">新密碼 NEW PASSWORD</label>
                <input class="w-full bg-surface-container-low border-none rounded focus:ring-0 focus:bg-surface-container-highest transition-all font-body text-on-surface px-4 py-3 text-sm" id="new-password" type="password" placeholder="包含大小寫字母與數字"/>
              </div>
              <div class="space-y-2">
                <label class="block font-body text-[10px] font-bold uppercase tracking-widest text-on-surface-variant/60 ml-1">確認新密碼 CONFIRM</label>
                <input class="w-full bg-surface-container-low border-none rounded focus:ring-0 focus:bg-surface-container-highest transition-all font-body text-on-surface px-4 py-3 text-sm" id="confirm-password" type="password" placeholder="再次輸入新密碼"/>
              </div>
            </div>
          </div>

          <!-- Action Buttons (Adjusted) -->
          <div
            class="bg-surface-container-low px-8 py-5 flex justify-end items-center gap-4 -mx-8 -mb-8 mt-10"
          >
            <button
              id="btn-cancel"
              class="font-body text-sm font-medium text-on-surface-variant hover:text-error transition-colors px-4 py-2"
              onclick="goBackToPreviousPage()"
              type="button"
            >
              取消 / CANCEL
            </button>
            <button
              id="btn-next"
              class="bg-primary text-on-primary font-body text-sm font-medium px-6 py-2.5 rounded transition-all hover:bg-primary-container hover:shadow-md"
              onclick="handleNextStep()"
              type="button"
            >
              下一步 / NEXT
            </button>
          </div>
        </div>
      </div>
    </div>
    <script>
      let currentStep = 1;
      let matchedMember = null;

      const questionMap = {
          'q1': '您第一所就讀的小學名稱？',
          'q2': '您最喜歡的一本書？',
          'q3': '您兒時的寵物名字？'
      };

      function goBackToPreviousPage() {
        if (window.history.length > 1) {
          window.history.back();
          return;
        }
        window.location.href = "../froggy_login/login.html";
      }

      async function handleNextStep() {
          if (currentStep === 1) {
              await verifyEmail();
          } else if (currentStep === 2) {
              verifyAnswer();
          } else if (currentStep === 3) {
              await updatePassword();
          }
      }

      async function verifyEmail() {
          const email = document.getElementById('recovery-email').value.trim().toLowerCase();
          if (!email) {
              alert('請輸入註冊時的電子郵件。');
              return;
          }

          try {
              const response = await fetch('../../python/member.json', { cache: 'no-store' });
              if (!response.ok) throw new Error('無法載入會員資料');
              const members = await response.json();
              
              matchedMember = members.find(m => m.email.toLowerCase() === email);
              
              if (!matchedMember) {
                  alert('找不到此電子郵件帳號，請重新檢查。');
                  return;
              }

              // Proceed to Step 2
              currentStep = 2;
              document.getElementById('section-email').classList.add('hidden');
              document.getElementById('section-security').classList.remove('hidden');
              document.getElementById('display-question').textContent = 
                  questionMap[matchedMember.securityQuestion] || matchedMember.securityQuestion;
              document.getElementById('step-desc').innerHTML = `
                <p class="font-body text-on-surface mb-2 text-sm leading-relaxed">請回答您的安全性問題以驗證身分。</p>
                <p class="font-body text-on-surface-variant text-sm leading-relaxed">Please answer your security question.</p>
              `;
          } catch (error) {
              console.error(error);
              alert('發生錯誤，請稍後再試。');
          }
      }

      function verifyAnswer() {
          const answer = document.getElementById('security-answer').value.trim();
          if (!answer) {
              alert('請輸入答案。');
              return;
          }

          if (answer === matchedMember.securityAnswer) {
              // Proceed to Step 3
              currentStep = 3;
              document.getElementById('section-security').classList.add('hidden');
              document.getElementById('section-newpwd').classList.remove('hidden');
              document.getElementById('step-desc').innerHTML = `
                <p class="font-body text-on-surface mb-2 text-sm leading-relaxed">驗證成功！請設定您的新密碼。</p>
                <p class="font-body text-on-surface-variant text-sm leading-relaxed">Verification success! Please set your new password.</p>
              `;
              document.getElementById('btn-next').textContent = '更新密碼 / UPDATE';
          } else {
              alert('答案錯誤，驗證失敗。');
          }
      }

      async function updatePassword() {
          const newPwd = document.getElementById('new-password').value;
          const confirmPwd = document.getElementById('confirm-password').value;

          // 驗證格式 (20碼內，包含大小寫與數字)
          const pwdRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)[A-Za-z\d]{1,20}$/;
          if (!pwdRegex.test(newPwd)) {
              alert('密碼格式不符：需在 20 碼以內，且包含大小寫英文字母與數字。');
              return;
          }

          if (newPwd !== confirmPwd) {
              alert('兩次輸入的密碼不一致。');
              return;
          }

          try {
              const response = await fetch('/api/update-member', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({
                      email: matchedMember.email,
                      password: newPwd
                  })
              });

              const result = await response.json();
              if (result.ok) {
                  alert('密碼已成功更新！請使用新密碼登入。');
                  window.location.href = '../../window/froggy_main/mainscreen.html?login=1';
              } else {
                  alert('更新失敗：' + result.message);
              }
          } catch (error) {
              console.error(error);
              alert('伺服器連線失敗，請稍後再試。');
          }
      }
    </script>
  </body>
</html>
