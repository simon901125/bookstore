<!doctype html>

<html lang="zh-TW">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Froggy Bookstore - Forgot Account</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500;1,6..72,600;1,6..72,700&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary-fixed": "#d6e3ff",
              outline: "#74777f",
              "on-surface": "#1b1c1a",
              "inverse-primary": "#aec7f7",
              "secondary-container": "#ff9a59",
              "on-primary": "#ffffff",
              "tertiary-fixed": "#ffddb9",
              surface: "#fbf9f5",
              tertiary: "#321c00",
              "on-primary-fixed": "#001b3d",
              "on-secondary-fixed-variant": "#743400",
              "error-container": "#ffdad6",
              "on-tertiary-fixed": "#2b1700",
              "surface-variant": "#e4e2de",
              "surface-container-low": "#f5f3ef",
              "primary-fixed-dim": "#aec7f7",
              "outline-variant": "#c4c6cf",
              "secondary-fixed-dim": "#ffb68b",
              "on-primary-container": "#87a0cd",
              "tertiary-fixed-dim": "#f1bd81",
              primary: "#002046",
              secondary: "#96490b",
              "surface-container-highest": "#e4e2de",
              "on-tertiary-fixed-variant": "#623f0f",
              "tertiary-container": "#4f2f00",
              "on-error-container": "#93000a",
              "on-surface-variant": "#44474e",
              "primary-container": "#1b365d",
              "on-secondary-fixed": "#321300",
              error: "#ba1a1a",
              "inverse-on-surface": "#f2f0ed",
              "on-error": "#ffffff",
              "surface-bright": "#fbf9f5",
              "on-tertiary": "#ffffff",
              "surface-tint": "#465f88",
              background: "#fbf9f5",
              "surface-dim": "#dbdad6",
              "surface-container-lowest": "#ffffff",
              "surface-container": "#efeeea",
              "on-primary-fixed-variant": "#2e476f",
              "on-background": "#1b1c1a",
              "inverse-surface": "#30312e",
              "on-tertiary-container": "#c6965e",
              "on-secondary-container": "#723300",
              "on-secondary": "#ffffff",
              "secondary-fixed": "#ffdbc8",
              "surface-container-high": "#eae8e4",
            },
            borderRadius: {
              DEFAULT: "0.125rem",
              lg: "0.25rem",
              xl: "0.5rem",
              full: "0.75rem",
            },
            spacing: {},
            fontFamily: {
              headline: ["Newsreader"],
              display: ["Newsreader"],
              body: ["Manrope"],
              label: ["Manrope"],
            },
            fontSize: {},
          },
        },
      };
    </script>
    <style>
      body {
        font-family: "Manrope", sans-serif;
        background-color: theme("colors.background");
        color: theme("colors.on-background");
      }
      h1,
      h2,
      h3,
      h4,
      h5,
      h6,
      .font-newsreader {
        font-family: "Newsreader", serif;
      }
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
    </style>
  </head>
  <body
    class="antialiased min-h-screen relative overflow-hidden flex flex-col justify-between"
  >
    <!-- Blurred Background (Homepage simulation) -->
    <div
      class="absolute inset-0 z-0 w-full h-full bg-surface-container-low"
      data-alt="Interior of a classic, cozy bookstore with tall wooden shelves filled with old books, warm ambient lighting, slightly blurred"
      style="
        background-image: url(&quot;https://lh3.googleusercontent.com/aida-public/AB6AXuCvJ7t0lY2h983LUX9aqisG0Kdh9s7Fq9ZtpTZbSL3A6m8J46LFCYuC6DZl9UIGuX5mOMxMR0ZA0biv5PVUusYm6z5D3HJvsySF1xv-YVXG5cY1coHKeHLK2BeFljJ9Gl6RcF77KEYy3-bR9GjmOh3QUBGAX5pXJeurKtyrl0Eba0msBXRZrO5LmD5Z69x4d8UpZtTbWeRWFAliLc3Uu2No5OyXvwTYEfYCwybSCibEfyqMABkN2xvs_Yv7arKTswlg-Efv3LjFAiBr&quot;);
        background-size: cover;
        background-position: center;
        filter: blur(8px) brightness(0.9);
      "
    ></div>
    <div class="absolute inset-0 z-10 bg-surface/70 backdrop-blur-sm"></div>
    <!-- Main Navigation TopAppBar (Simulated background) -->
    <!-- Modal Container -->
    <main
      class="z-50 relative flex-grow flex items-center justify-center p-4 sm:p-6"
    >
      <div
        class="w-full max-w-md bg-surface-container-lowest rounded-lg shadow-[0_12px_40px_rgba(27,28,26,0.06)] overflow-hidden"
      >
        <!-- Modal Header -->
        <div class="bg-primary px-6 py-4 flex justify-between items-center">
          <h2
            class="font-headline text-on-primary text-xl font-medium tracking-wide"
          >
            找回帳號 / FORGOT ACCOUNT
          </h2>
          <button
            aria-label="Close modal"
            class="text-on-primary/70 hover:text-on-primary transition-colors focus:outline-none"
            onclick="goBackToPreviousPage()"
            type="button"
          >
            <span class="material-symbols-outlined text-2xl">close</span>
          </button>
        </div>
        <!-- Modal Body -->
        <div class="p-8">
          <div id="step-desc" class="mb-8">
            <p
              class="font-body text-on-surface-variant text-sm leading-relaxed mb-2"
            >
              請輸入您註冊時使用的電話號碼以開始找回程序。
            </p>
            <p
              class="font-body text-on-surface-variant text-sm leading-relaxed"
            >
              Please enter your registered phone number to start recovery.
            </p>
          </div>

          <!-- Step 1: Phone -->
          <div id="section-phone" class="space-y-6">
            <div class="space-y-2">
              <label
                class="block font-body text-on-surface text-sm font-medium"
                for="recovery-phone"
                >電話號碼 Phone Number</label
              >
              <div class="relative">
                <span
                  class="absolute inset-y-0 left-0 flex items-center pl-3 text-on-surface-variant"
                >
                  <span class="material-symbols-outlined text-lg">call</span>
                </span>
                <input
                  class="w-full pl-10 pr-4 py-3 bg-surface-container-low border-none rounded focus:ring-0 focus:bg-surface-container-highest transition-all font-body text-on-surface placeholder:text-outline-variant text-sm"
                  id="recovery-phone"
                  placeholder="09XXXXXXXX"
                  type="tel"
                />
              </div>
            </div>
          </div>

          <!-- Step 2: Security Question (Hidden by default) -->
          <div id="section-security" class="space-y-6 hidden">
            <div class="space-y-4">
              <div class="p-4 bg-primary/5 rounded-lg border border-primary/10">
                <p class="text-[10px] uppercase tracking-widest text-primary font-bold mb-1">您的安全提問：</p>
                <p id="display-question" class="font-headline text-lg text-primary italic">...</p>
              </div>
              <div class="space-y-2">
                <label
                  class="block font-body text-on-surface text-sm font-medium"
                  for="security-answer"
                  >安全提問答案 Answer</label
                >
                <div class="relative">
                  <span
                    class="absolute inset-y-0 left-0 flex items-center pl-3 text-on-surface-variant"
                  >
                    <span class="material-symbols-outlined text-lg">key</span>
                  </span>
                  <input
                    class="w-full pl-10 pr-4 py-3 bg-surface-container-low border-none rounded focus:ring-0 focus:bg-surface-container-highest transition-all font-body text-on-surface placeholder:text-outline-variant text-sm"
                    id="security-answer"
                    placeholder="輸入答案"
                    type="text"
                  />
                </div>
              </div>
            </div>
          </div>

          <!-- Step 3: Result (Hidden by default) -->
          <div id="section-result" class="space-y-6 hidden text-center py-4">
             <div class="mx-auto w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center mb-4">
                <span class="material-symbols-outlined text-4xl">account_circle</span>
             </div>
             <h3 class="font-headline text-2xl text-primary mb-2">已成功找回帳號</h3>
             <div class="bg-surface-container p-6 rounded-xl border border-outline-variant/30">
                <p class="text-xs uppercase tracking-widest text-on-surface-variant/60 mb-2">您的電子郵件帳號為：</p>
                <p id="display-email" class="font-body text-xl font-bold text-primary select-all">...</p>
             </div>
          </div>
        </div>
        <!-- Modal Footer -->
        <div
          class="bg-surface-container-low px-6 py-5 flex justify-end items-center gap-4"
        >
          <button
            id="btn-cancel"
            class="font-body text-sm font-medium text-on-surface-variant hover:text-error transition-colors px-4 py-2"
            onclick="goBackToPreviousPage()"
            type="button"
          >
            取消 / CANCEL
          </button>
          <button
            id="btn-next"
            class="bg-primary text-on-primary font-body text-sm font-medium px-6 py-2.5 rounded transition-all hover:bg-primary-container hover:shadow-md"
            onclick="handleNextStep()"
            type="button"
          >
            下一步 / NEXT
          </button>
          <button
            id="btn-login"
            class="hidden bg-primary text-on-primary font-body text-sm font-medium px-8 py-2.5 rounded transition-all hover:bg-primary-container hover:shadow-md"
            onclick="location.href='../../window/froggy_main/mainscreen.html?login=1'"
            type="button"
          >
            前往登入 / LOGIN
          </button>
        </div>
      </div>
    </main>
    <!-- Bottom Navigation Bar (Simulated background) -->
    <script>
      let currentStep = 1;
      let matchedMember = null;

      const questionMap = {
          'q1': '您第一所就讀的小學名稱？',
          'q2': '您最喜歡的一本書？',
          'q3': '您兒時的寵物名字？'
      };

      function goBackToPreviousPage() {
        if (window.history.length > 1) {
          window.history.back();
          return;
        }
        window.location.href = "../froggy_login/login.html";
      }

      async function handleNextStep() {
          if (currentStep === 1) {
              await verifyPhone();
          } else if (currentStep === 2) {
              verifyAnswer();
          }
      }

      async function verifyPhone() {
          const phone = document.getElementById('recovery-phone').value.trim();
          if (!phone) {
              alert('請輸入註冊時的電話號碼。');
              return;
          }

          try {
              const response = await fetch('../../python/member.json', { cache: 'no-store' });
              if (!response.ok) throw new Error('無法載入會員資料');
              const members = await response.json();
              
              matchedMember = members.find(m => m.phone === phone);
              
              if (!matchedMember) {
                  alert('找不到與此電話號碼關聯的帳號，請重新檢查。');
                  return;
              }

              // Proceed to Step 2
              currentStep = 2;
              document.getElementById('section-phone').classList.add('hidden');
              document.getElementById('section-security').classList.remove('hidden');
              document.getElementById('display-question').textContent = 
                  questionMap[matchedMember.securityQuestion] || matchedMember.securityQuestion;
              document.getElementById('step-desc').innerHTML = `
                <p class="font-body text-on-surface-variant text-sm leading-relaxed mb-2">請回答您的安全性問題以驗證身分。</p>
                <p class="font-body text-on-surface-variant text-sm leading-relaxed">Please answer your security question.</p>
              `;
          } catch (error) {
              console.error(error);
              alert('發生錯誤，請稍後再試。');
          }
      }

      function verifyAnswer() {
          const answer = document.getElementById('security-answer').value.trim();
          if (!answer) {
              alert('請輸入答案。');
              return;
          }

          if (answer === matchedMember.securityAnswer) {
              // Proceed to Step 3
              currentStep = 3;
              document.getElementById('section-security').classList.add('hidden');
              document.getElementById('section-result').classList.remove('hidden');
              document.getElementById('display-email').textContent = matchedMember.email;
              document.getElementById('step-desc').classList.add('hidden');
              
              document.getElementById('btn-next').classList.add('hidden');
              document.getElementById('btn-cancel').classList.add('hidden');
              document.getElementById('btn-login').classList.remove('hidden');
          } else {
              alert('答案錯誤，驗證失敗。');
          }
      }
    </script>
  </body>
</html>
