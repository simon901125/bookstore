<!doctype html>

<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>froggy書局 - 會員註冊</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500;1,6..72,600;1,6..72,700&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-tertiary": "#ffffff",
              "tertiary-container": "#4f2f00",
              "tertiary-fixed": "#ffddb9",
              "on-secondary-fixed-variant": "#743400",
              error: "#ba1a1a",
              "primary-fixed-dim": "#aec7f7",
              "surface-tint": "#465f88",
              "on-primary-fixed": "#001b3d",
              "on-tertiary-fixed-variant": "#623f0f",
              "inverse-on-surface": "#f2f0ed",
              background: "#fbf9f5",
              "on-secondary-container": "#723300",
              "surface-bright": "#fbf9f5",
              "on-error": "#ffffff",
              "inverse-surface": "#30312e",
              secondary: "#96490b",
              "secondary-container": "#ff9a59",
              "outline-variant": "#c4c6cf",
              "primary-container": "#1b365d",
              "error-container": "#ffdad6",
              primary: "#002046",
              "surface-container-high": "#eae8e4",
              "primary-fixed": "#d6e3ff",
              "on-secondary-fixed": "#321300",
              "surface-container": "#efeeea",
              "on-background": "#1b1c1a",
              outline: "#74777f",
              "secondary-fixed-dim": "#ffb68b",
              "on-tertiary-container": "#c6965e",
              surface: "#fbf9f5",
              "on-secondary": "#ffffff",
              "secondary-fixed": "#ffdbc8",
              "on-surface-variant": "#44474e",
              "surface-container-low": "#f5f3ef",
              "surface-variant": "#e4e2de",
              "tertiary-fixed-dim": "#f1bd81",
              "on-primary-fixed-variant": "#2e476f",
              "surface-container-highest": "#e4e2de",
              "on-primary": "#ffffff",
              "on-surface": "#1b1c1a",
              "on-tertiary-fixed": "#2b1700",
              "on-primary-container": "#87a0cd",
              tertiary: "#321c00",
              "surface-dim": "#dbdad6",
              "surface-container-lowest": "#ffffff",
              "on-error-container": "#93000a",
              "inverse-primary": "#aec7f7",
            },
            borderRadius: {
              DEFAULT: "0.125rem",
              lg: "0.25rem",
              xl: "0.5rem",
              full: "0.75rem",
            },
            spacing: {},
            fontFamily: {
              headline: ["Newsreader"],
              display: ["Newsreader"],
              body: ["Manrope"],
              label: ["Manrope"],
            },
            fontSize: {},
          },
        },
      };
    </script>
    <style>
      body {
        background-color: theme("colors.background");
        color: theme("colors.on-background");
        font-family: theme("fontFamily.body");
      }
      h1,
      h2,
      h3,
      h4,
      h5,
      h6 {
        font-family: theme("fontFamily.headline");
      }
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
    </style>
  </head>
  <body class="min-h-screen flex flex-col bg-surface">
    <!-- TopAppBar -->
    <nav
      class="fixed top-0 w-full z-50 bg-[#002046] border-b border-primary/20"
    >
      <div
        class="flex justify-between items-center px-8 md:px-16 py-5 w-full max-w-screen-2xl mx-auto"
      >
        <div class="flex items-center gap-12">
          <a
            class="text-2xl font-['Newsreader'] font-bold text-white"
            href="../froggy_main/mainscreen.html"
            >froggy書局</a
          >
          <div class="hidden md:flex gap-4 items-center">
            <a
              class="text-white/60 px-4 py-2 font-body uppercase tracking-widest text-[11px] hover:text-white transition-colors duration-300"
              href="../froggy_main/mainscreen.html"
              >首頁</a
            >
            <a
              class="text-white/60 px-4 py-2 font-body uppercase tracking-widest text-[11px] hover:text-white transition-colors duration-300"
              href="../froggy_new_book/new_book.html"
              >新書</a
            >
            <a
              class="px-4 py-2 rounded-lg font-body uppercase tracking-widest text-[11px] transition-colors duration-300 text-white/60 hover:text-white"
              href="../froggy_rk/ranking.html"
              >排行榜</a
            >
          </div>
        </div>
        <div class="flex items-center gap-4">
          <a
            class="scale-95 active:opacity-80 transition-all text-white flex items-center justify-center"
            href="../froggy_cart/cart.html"
            ><span class="material-symbols-outlined">shopping_bag</span></a
          >
          <a
            class="active:opacity-80 transition-all text-white bg-white/10 rounded-lg p-2"
            href="../../window_jp/froggy_login/login.html"
          >
            <span class="material-symbols-outlined">person</span>
          </a>
        </div>
      </div>
    </nav>
    <!-- Main Content Canvas -->
    <main
      class="flex-grow flex items-center justify-center pt-32 pb-24 px-6 sm:px-8"
    >
      <div
        class="w-full max-w-2xl bg-surface-container-lowest rounded-lg p-10 sm:p-16 shadow-[0_12px_40px_rgba(27,28,26,0.06)] outline outline-1 outline-outline-variant/15 relative overflow-hidden"
      >
        <div class="text-center mb-12">
          <h1
            class="text-4xl md:text-5xl font-display text-primary mb-4 italic"
          >
            加入會員
          </h1>
          <p class="font-body text-on-surface-variant text-sm tracking-wide">
            成為 froggy書局 會員，開啟您的專屬閱讀旅程。
          </p>
        </div>
        <form class="space-y-12">
          <!-- Section 1: Account Information -->
          <fieldset class="space-y-6">
            <legend
              class="font-display text-2xl text-primary border-b border-surface-variant/50 w-full pb-2 mb-6"
            >
              帳號資訊
            </legend>
            <div class="space-y-2">
              <label
                class="block font-body text-sm font-medium text-primary"
                for="email"
                >電子郵件 (作為登入帳號)
                <span class="text-secondary">*</span></label
              >
              <input
                class="w-full bg-surface-container-low border-none rounded focus:bg-surface-container-highest focus:ring-1 focus:ring-surface-tint font-body text-on-surface py-3 px-4 transition-colors"
                id="email"
                name="email"
                required=""
                type="email"
              />
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
              <div class="space-y-2">
                <label
                  class="block font-body text-sm font-medium text-primary"
                  for="password"
                  >密碼 <span class="text-secondary">*</span></label
                >
                <input
                  class="w-full bg-surface-container-low border-none rounded focus:bg-surface-container-highest focus:ring-1 focus:ring-surface-tint font-body text-on-surface py-3 px-4 transition-colors"
                  id="password"
                  name="password"
                  required=""
                  type="password"
                />
              </div>
              <div class="space-y-2">
                <label
                  class="block font-body text-sm font-medium text-primary"
                  for="confirm-password"
                  >確認密碼 <span class="text-secondary">*</span></label
                >
                <input
                  class="w-full bg-surface-container-low border-none rounded focus:bg-surface-container-highest focus:ring-1 focus:ring-surface-tint font-body text-on-surface py-3 px-4 transition-colors"
                  id="confirm-password"
                  name="confirm-password"
                  required=""
                  type="password"
                />
              </div>
            </div>
          </fieldset>
          <!-- Section 2: Personal Details -->
          <fieldset class="space-y-6">
            <legend
              class="font-display text-2xl text-primary border-b border-surface-variant/50 w-full pb-2 mb-6"
            >
              個人資料
            </legend>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
              <div class="space-y-2">
                <label
                  class="block font-body text-sm font-medium text-primary"
                  for="nickname"
                  >暱稱 <span class="text-secondary">*</span></label
                >
                <input
                  class="w-full bg-surface-container-low border-none rounded focus:bg-surface-container-highest focus:ring-1 focus:ring-surface-tint font-body text-on-surface py-3 px-4 transition-colors"
                  id="nickname"
                  name="nickname"
                  required=""
                  type="text"
                />
              </div>
              <div class="space-y-2">
                <label
                  class="block font-body text-sm font-medium text-primary mb-3"
                  >性別 <span class="text-secondary">*</span></label
                >
                <div class="flex flex-wrap gap-4">
                  <label class="flex items-center gap-2 cursor-pointer group">
                    <input
                      class="text-primary focus:ring-primary bg-surface-container-low border-none"
                      name="gender"
                      required=""
                      type="radio"
                      value="male"
                    />
                    <span
                      class="font-body text-sm text-on-surface-variant group-hover:text-primary transition-colors"
                      >男性</span
                    >
                  </label>
                  <label class="flex items-center gap-2 cursor-pointer group">
                    <input
                      class="text-primary focus:ring-primary bg-surface-container-low border-none"
                      name="gender"
                      type="radio"
                      value="female"
                    />
                    <span
                      class="font-body text-sm text-on-surface-variant group-hover:text-primary transition-colors"
                      >女性</span
                    >
                  </label>
                  <label class="flex items-center gap-2 cursor-pointer group">
                    <input
                      checked=""
                      class="text-primary focus:ring-primary bg-surface-container-low border-none"
                      name="gender"
                      type="radio"
                      value="undisclosed"
                    />
                    <span
                      class="font-body text-sm text-on-surface-variant group-hover:text-primary transition-colors"
                      >不公開</span
                    >
                  </label>
                </div>
              </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
              <div class="space-y-2">
                <label
                  class="block font-body text-sm font-medium text-primary"
                  for="birthday"
                  >生日 <span class="text-secondary">*</span></label
                >
                <div class="relative">
                  <input
                    class="w-full bg-surface-container-low border-none rounded focus:bg-surface-container-highest focus:ring-1 focus:ring-surface-tint font-body text-on-surface py-3 px-4 transition-colors cursor-pointer appearance-none"
                    id="birthday"
                    name="birthday"
                    required=""
                    type="date"
                  />
                </div>
              </div>
              <div class="space-y-2">
                <label
                  class="block font-body text-sm font-medium text-primary"
                  for="phone"
                  >聯絡電話 <span class="text-secondary">*</span></label
                >
                <input
                  class="w-full bg-surface-container-low border-none rounded focus:bg-surface-container-highest focus:ring-1 focus:ring-surface-tint font-body text-on-surface py-3 px-4 transition-colors"
                  id="phone"
                  name="phone"
                  required=""
                  type="tel"
                />
              </div>
            </div>
            <div class="space-y-2">
              <label
                class="block font-body text-sm font-medium text-primary"
                for="address"
                >完整地址 <span class="text-secondary">*</span></label
              >
              <input
                class="w-full bg-surface-container-low border-none rounded focus:bg-surface-container-highest focus:ring-1 focus:ring-surface-tint font-body text-on-surface py-3 px-4 transition-colors"
                id="address"
                name="address"
                required=""
                type="text"
              />
            </div>
          </fieldset>
          <!-- Section 3: Security Setup -->
          <fieldset class="space-y-6">
            <legend
              class="font-display text-2xl text-primary border-b border-surface-variant/50 w-full pb-2 mb-6"
            >
              安全設定
            </legend>
            <div class="space-y-2">
              <label
                class="block font-body text-sm font-medium text-primary"
                for="security-question"
                >安全提問 <span class="text-secondary">*</span></label
              >
              <div class="relative">
                <select
                  class="w-full bg-surface-container-low bg-none border-none rounded focus:bg-surface-container-highest focus:ring-1 focus:ring-surface-tint font-body text-on-surface py-3 pl-4 pr-10 appearance-none transition-colors cursor-pointer"
                  id="security-question"
                  name="security-question"
                  required=""
                >
                  <option disabled="" selected="" value="">
                    請選擇一個安全提問...
                  </option>
                  <option value="q1">您第一所就讀的小學名稱？</option>
                  <option value="q2">您最喜歡的一本書？</option>
                  <option value="q3">您兒時的寵物名字？</option>
                </select>
                <span
                  class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none"
                  >expand_more</span
                >
              </div>
            </div>
            <div class="space-y-2">
              <label
                class="block font-body text-sm font-medium text-primary"
                for="security-answer"
                >回答 <span class="text-secondary">*</span></label
              >
              <input
                class="w-full bg-surface-container-low border-none rounded focus:bg-surface-container-highest focus:ring-1 focus:ring-surface-tint font-body text-on-surface py-3 px-4 transition-colors"
                id="security-answer"
                name="security-answer"
                required=""
                type="text"
              />
            </div>
          </fieldset>
          <!-- Submit Area -->
          <div class="pt-8 flex flex-col items-center gap-6">
            <button
              class="w-full sm:w-auto bg-primary text-on-primary font-body font-medium tracking-wide py-4 px-12 rounded hover:opacity-90 transition-opacity bg-gradient-to-br from-primary to-primary-container shadow-md"
              type="submit"
            >
              註冊帳號
            </button>
            <a
              class="font-body text-sm text-primary hover:text-secondary border-b border-transparent hover:border-secondary transition-all pb-0.5"
              href="../../window_jp/froggy_login/login.html"
            >
              已經有帳號了嗎？立即登入
            </a>
          </div>
        </form>
      </div>
    </main>
    <!-- Footer -->
    <footer class="w-full mt-auto bg-[#002046] dark:bg-slate-950">
      <div
        class="flex flex-col md:flex-row justify-between items-start md:items-center px-12 py-16 w-full max-w-screen-2xl mx-auto"
      >
        <div class="space-y-4 mb-8 md:mb-0">
          <a
            class="text-xl font-bold text-[#fbf9f5] dark:text-white font-headline"
            href="#"
            >froggy書局</a
          >
          <p class="text-[#fbf9f5]/70 font-body text-sm">
            © 2024 froggy書局. 始於筆墨，承載智慧。
          </p>
        </div>
        <div class="flex flex-wrap gap-x-12 gap-y-4">
          <a
            class="text-[#fbf9f5]/70 font-body text-sm hover:text-secondary transition-colors"
            href="#"
            >品牌理念</a
          >
          <a
            class="text-[#fbf9f5]/70 font-body text-sm hover:text-secondary transition-colors"
            href="#"
            >關於我們</a
          >
          <a
            class="text-[#fbf9f5]/70 font-body text-sm hover:text-secondary transition-colors"
            href="#"
            >配送政策</a
          >
          <a
            class="text-[#fbf9f5]/70 font-body text-sm hover:text-secondary transition-colors"
            href="#"
            >隱私權條款</a
          >
        </div>
        <div class="mt-8 md:mt-0 flex gap-6">
          <span
            class="material-symbols-outlined text-[#fbf9f5]/50 hover:text-white cursor-pointer transition-colors"
            >public</span
          >
          <span
            class="material-symbols-outlined text-[#fbf9f5]/50 hover:text-white cursor-pointer transition-colors"
            >mail</span
          >
          <span
            class="material-symbols-outlined text-[#fbf9f5]/50 hover:text-white cursor-pointer transition-colors"
            >share</span
          >
        </div>
      </div>
    </footer>
  </body>
</html>
