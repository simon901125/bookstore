<!doctype html>

<html lang="zh-TW">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Froggy Bookstore - Forgot Account</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500;1,6..72,600;1,6..72,700&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary-fixed": "#d6e3ff",
              outline: "#74777f",
              "on-surface": "#1b1c1a",
              "inverse-primary": "#aec7f7",
              "secondary-container": "#ff9a59",
              "on-primary": "#ffffff",
              "tertiary-fixed": "#ffddb9",
              surface: "#fbf9f5",
              tertiary: "#321c00",
              "on-primary-fixed": "#001b3d",
              "on-secondary-fixed-variant": "#743400",
              "error-container": "#ffdad6",
              "on-tertiary-fixed": "#2b1700",
              "surface-variant": "#e4e2de",
              "surface-container-low": "#f5f3ef",
              "primary-fixed-dim": "#aec7f7",
              "outline-variant": "#c4c6cf",
              "secondary-fixed-dim": "#ffb68b",
              "on-primary-container": "#87a0cd",
              "tertiary-fixed-dim": "#f1bd81",
              primary: "#002046",
              secondary: "#96490b",
              "surface-container-highest": "#e4e2de",
              "on-tertiary-fixed-variant": "#623f0f",
              "tertiary-container": "#4f2f00",
              "on-error-container": "#93000a",
              "on-surface-variant": "#44474e",
              "primary-container": "#1b365d",
              "on-secondary-fixed": "#321300",
              error: "#ba1a1a",
              "inverse-on-surface": "#f2f0ed",
              "on-error": "#ffffff",
              "surface-bright": "#fbf9f5",
              "on-tertiary": "#ffffff",
              "surface-tint": "#465f88",
              background: "#fbf9f5",
              "surface-dim": "#dbdad6",
              "surface-container-lowest": "#ffffff",
              "surface-container": "#efeeea",
              "on-primary-fixed-variant": "#2e476f",
              "on-background": "#1b1c1a",
              "inverse-surface": "#30312e",
              "on-tertiary-container": "#c6965e",
              "on-secondary-container": "#723300",
              "on-secondary": "#ffffff",
              "secondary-fixed": "#ffdbc8",
              "surface-container-high": "#eae8e4",
            },
            borderRadius: {
              DEFAULT: "0.125rem",
              lg: "0.25rem",
              xl: "0.5rem",
              full: "0.75rem",
            },
            spacing: {},
            fontFamily: {
              headline: ["Newsreader"],
              display: ["Newsreader"],
              body: ["Manrope"],
              label: ["Manrope"],
            },
            fontSize: {},
          },
        },
      };
    </script>
    <style>
      body {
        font-family: "Manrope", sans-serif;
        background-color: theme("colors.background");
        color: theme("colors.on-background");
      }
      h1,
      h2,
      h3,
      h4,
      h5,
      h6,
      .font-newsreader {
        font-family: "Newsreader", serif;
      }
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
    </style>
  </head>
  <body
    class="antialiased min-h-screen relative overflow-hidden flex flex-col justify-between"
  >
    <!-- Blurred Background (Homepage simulation) -->
    <div
      class="absolute inset-0 z-0 w-full h-full bg-surface-container-low"
      data-alt="Interior of a classic, cozy bookstore with tall wooden shelves filled with old books, warm ambient lighting, slightly blurred"
      style="
        background-image: url(&quot;https://lh3.googleusercontent.com/aida-public/AB6AXuCvJ7t0lY2h983LUX9aqisG0Kdh9s7Fq9ZtpTZbSL3A6m8J46LFCYuC6DZl9UIGuX5mOMxMR0ZA0biv5PVUusYm6z5D3HJvsySF1xv-YVXG5cY1coHKeHLK2BeFljJ9Gl6RcF77KEYy3-bR9GjmOh3QUBGAX5pXJeurKtyrl0Eba0msBXRZrO5LmD5Z69x4d8UpZtTbWeRWFAliLc3Uu2No5OyXvwTYEfYCwybSCibEfyqMABkN2xvs_Yv7arKTswlg-Efv3LjFAiBr&quot;);
        background-size: cover;
        background-position: center;
        filter: blur(8px) brightness(0.9);
      "
    ></div>
    <div class="absolute inset-0 z-10 bg-surface/70 backdrop-blur-sm"></div>
    <!-- Main Navigation TopAppBar (Simulated background) -->
    <!-- Modal Container -->
    <main
      class="z-50 relative flex-grow flex items-center justify-center p-4 sm:p-6"
    >
      <div
        class="w-full max-w-md bg-surface-container-lowest rounded-lg shadow-[0_12px_40px_rgba(27,28,26,0.06)] overflow-hidden"
      >
        <!-- Modal Header -->
        <div class="bg-primary px-6 py-4 flex justify-between items-center">
          <h2
            class="font-headline text-on-primary text-xl font-medium tracking-wide"
          >
            忘記帳號 / FORGOT ACCOUNT
          </h2>
          <button
            aria-label="Close modal"
            class="text-on-primary/70 hover:text-on-primary transition-colors focus:outline-none"
            onclick="goBackToPreviousPage()"
            type="button"
          >
            <span class="material-symbols-outlined text-2xl">close</span>
          </button>
        </div>
        <!-- Modal Body -->
        <div class="p-8">
          <div class="mb-8">
            <p
              class="font-body text-on-surface-variant text-sm leading-relaxed mb-4"
            >
              請輸入您註冊時使用的電話號碼，或回答您的安全提問以找回您的帳號名稱。
            </p>
            <p
              class="font-body text-on-surface-variant text-sm leading-relaxed"
            >
              Please enter your registered phone number or answer your security
              question to recover your account name.
            </p>
          </div>
          <form class="space-y-6">
            <div class="space-y-2">
              <label
                class="block font-body text-on-surface text-sm font-medium"
                for="recovery-phone"
                >電話號碼 Phone Number</label
              >
              <div class="relative">
                <span
                  class="absolute inset-y-0 left-0 flex items-center pl-3 text-on-surface-variant"
                >
                  <span class="material-symbols-outlined text-lg">call</span>
                </span>
                <input
                  class="w-full pl-10 pr-4 py-3 bg-surface-container-low border-none rounded focus:ring-0 focus:bg-surface-container-highest focus:shadow-[0_0_0_1px_theme('colors.surface-tint')] transition-all font-body text-on-surface placeholder:text-outline-variant text-sm"
                  id="recovery-phone"
                  name="recovery-phone"
                  placeholder="請輸入註冊電話 / Enter Phone Number"
                  type="tel"
                />
              </div>
            </div>
            <!-- Visual Divider with 'OR' -->
            <div class="relative flex py-2 items-center">
              <div
                class="flex-grow border-t border-surface-container-high"
              ></div>
              <span
                class="flex-shrink-0 mx-4 text-on-surface-variant text-xs font-medium uppercase tracking-widest font-body"
                >or</span
              >
              <div
                class="flex-grow border-t border-surface-container-high"
              ></div>
            </div>
            <div class="space-y-2">
              <label
                class="block font-body text-on-surface text-sm font-medium"
                for="security-question"
                >安全提問 Security Question</label
              >
              <select
                class="w-full px-4 py-3 bg-surface-container-low border-none rounded focus:ring-0 focus:bg-surface-container-highest focus:shadow-[0_0_0_1px_theme('colors.surface-tint')] transition-all font-body text-on-surface text-sm appearance-none cursor-pointer"
                id="security-question"
                name="security-question"
              >
                <option disabled="" selected="" value="">
                  選擇一個問題 / Select a question
                </option>
                <option value="q1">
                  您最喜歡的作者是誰？ / Who is your favorite author?
                </option>
                <option value="q2">
                  您第一本讀完的書？ / The first book you finished?
                </option>
                <option value="q3">
                  您童年最愛的童話？ / Favorite childhood fairy tale?
                </option>
              </select>
              <div class="relative mt-2">
                <span
                  class="absolute inset-y-0 left-0 flex items-center pl-3 text-on-surface-variant"
                >
                  <span class="material-symbols-outlined text-lg">key</span>
                </span>
                <input
                  class="w-full pl-10 pr-4 py-3 bg-surface-container-low border-none rounded focus:ring-0 focus:bg-surface-container-highest focus:shadow-[0_0_0_1px_theme('colors.surface-tint')] transition-all font-body text-on-surface placeholder:text-outline-variant text-sm mt-2"
                  id="security-answer"
                  name="security-answer"
                  placeholder="您的答案 / Your Answer"
                  type="text"
                />
              </div>
            </div>
          </form>
        </div>
        <!-- Modal Footer -->
        <div
          class="bg-surface-container-low px-6 py-5 flex justify-end items-center gap-4"
        >
          <button
            class="font-body text-sm font-medium text-on-surface-variant hover:text-error transition-colors px-4 py-2"
            onclick="goBackToPreviousPage()"
            type="button"
          >
            取消 / CANCEL
          </button>
          <button
            class="bg-primary text-on-primary font-body text-sm font-medium px-6 py-2.5 rounded transition-all hover:bg-primary-container hover:shadow-md"
            type="button"
          >
            找回帳號 / RECOVER ACCOUNT
          </button>
        </div>
      </div>
    </main>
    <!-- Bottom Navigation Bar (Simulated background) -->
    <script>
      function goBackToPreviousPage() {
        if (window.history.length > 1) {
          window.history.back();
          return;
        }
        window.location.href = "../froggy_login/login.html";
      }
    </script>
  </body>
</html>
