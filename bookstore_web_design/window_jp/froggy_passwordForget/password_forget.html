<!doctype html>

<html class="h-full" lang="zh-TW">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Froggy Bookstore - Forgot Password</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&amp;display=swap"

      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary-fixed": "#d6e3ff",
              outline: "#74777f",
              "on-surface": "#1b1c1a",
              "inverse-primary": "#aec7f7",
              "secondary-container": "#ff9a59",
              "on-primary": "#ffffff",
              "tertiary-fixed": "#ffddb9",
              surface: "#fbf9f5",
              tertiary: "#321c00",
              "on-primary-fixed": "#001b3d",
              "on-secondary-fixed-variant": "#743400",
              "error-container": "#ffdad6",
              "on-tertiary-fixed": "#2b1700",
              "surface-variant": "#e4e2de",
              "surface-container-low": "#f5f3ef",
              "primary-fixed-dim": "#aec7f7",
              "outline-variant": "#c4c6cf",
              "secondary-fixed-dim": "#ffb68b",
              "on-primary-container": "#87a0cd",
              "tertiary-fixed-dim": "#f1bd81",
              primary: "#002046",
              secondary: "#96490b",
              "surface-container-highest": "#e4e2de",
              "on-tertiary-fixed-variant": "#623f0f",
              "tertiary-container": "#4f2f00",
              "on-error-container": "#93000a",
              "on-surface-variant": "#44474e",
              "primary-container": "#1b365d",
              "on-secondary-fixed": "#321300",
              error: "#ba1a1a",
              "inverse-on-surface": "#f2f0ed",
              "on-error": "#ffffff",
              "surface-bright": "#fbf9f5",
              "on-tertiary": "#ffffff",
              "surface-tint": "#465f88",
              background: "#fbf9f5",
              "surface-dim": "#dbdad6",
              "surface-container-lowest": "#ffffff",
              "surface-container": "#efeeea",
              "on-primary-fixed-variant": "#2e476f",
              "on-background": "#1b1c1a",
              "inverse-surface": "#30312e",
              "on-tertiary-container": "#c6965e",
              "on-secondary-container": "#723300",
              "on-secondary": "#ffffff",
              "secondary-fixed": "#ffdbc8",
              "surface-container-high": "#eae8e4",
            },
            borderRadius: {
              DEFAULT: "0.125rem",
              lg: "0.25rem",
              xl: "0.5rem",
              full: "0.75rem",
            },
            spacing: {},
            fontFamily: {
              headline: ["Newsreader"],
              display: ["Newsreader"],
              body: ["Manrope"],
              label: ["Manrope"],
            },
            fontSize: {},

    <style>
      body {
        font-family: "Manrope", sans-serif;
      }
      h1,
      h2,
      h3,
      h4,
      h5,
      h6,
      .font-newsreader {
        font-family: "Newsreader", serif;
      }
    </style>
  </head>
  <body
    class="h-full bg-background text-on-background antialiased relative overflow-hidden"
  >
    <!-- Blurred Background simulating Homepage -->
    <div
      class="absolute inset-0 z-0 w-full h-full bg-surface-container-low"
      data-alt="Interior of a classic, cozy bookstore with tall wooden shelves filled with old books, warm ambient lighting, slightly blurred"
      style="
        background-image: url(&quot;https://lh3.googleusercontent.com/aida-public/AB6AXuCvJ7t0lY2h983LUX9aqisG0Kdh9s7Fq9ZtpTZbSL3A6m8J46LFCYuC6DZl9UIGuX5mOMxMR0ZA0biv5PVUusYm6z5D3HJvsySF1xv-YVXG5cY1coHKeHLK2BeFljJ9Gl6RcF77KEYy3-bR9GjmOh3QUBGAX5pXJeurKtyrl0Eba0msBXRZrO5LmD5Z69x4d8UpZtTbWeRWFAliLc3Uu2No5OyXvwTYEfYCwybSCibEfyqMABkN2xvs_Yv7arKTswlg-Efv3LjFAiBr&quot;);
        background-size: cover;
        background-position: center;
        filter: blur(8px) brightness(0.9);
      "
    ></div>
    <div class="absolute inset-0 z-0 bg-surface/70 backdrop-blur-sm"></div>
    <!-- Modal Overlay Container -->
    <div
      class="relative z-50 flex items-center justify-center min-h-screen px-4 py-12 sm:px-6 lg:px-8"
    >
      <!-- Modal Dialog -->
      <div
        class="w-full max-w-md bg-surface-container-lowest rounded-lg shadow-[0_12px_40px_rgba(27,28,26,0.15)] overflow-hidden flex flex-col border border-outline-variant/15"
      >
        <!-- Header Bar -->
        <div class="bg-primary px-6 py-4 flex justify-between items-center">
          <h2
            class="font-headline text-xl text-on-primary font-medium tracking-wide"
          >
            忘記密碼
            <span class="opacity-70 text-sm ml-1">/ FORGOT PASSWORD</span>
          </h2>
          <button
            aria-label="Close"
            class="text-on-primary/70 hover:text-on-primary transition-colors focus:outline-none focus:ring-2 focus:ring-on-primary/50 rounded-DEFAULT p-1"
            onclick="goBackToPreviousPage()"
            type="button"
          >
            <span class="material-symbols-outlined" data-icon="close"
              >close</span
            >
          </button>
        </div>
        <!-- Modal Content -->
        <div class="px-8 flex flex-col gap-8 pt-10">
          <!-- Prompt Text -->
          <div class="mb-8 text-left">
            <p class="font-body text-on-surface mb-2 text-sm leading-relaxed">
              請輸入您註冊的電子郵件地址，我們將發送密碼重設連結給您。
            </p>
            <p
              class="font-body text-on-surface-variant text-sm leading-relaxed"
            >
              Please enter your registered email address to receive a password
              reset link.
            </p>
          </div>
          <!-- Input Field Form -->
          <form action="#" class="space-y-6" method="POST">
            <div class="flex flex-col gap-2">
              <label
                class="font-label text-sm text-on-surface-variant uppercase tracking-wider font-semibold sr-only"
                for="email"
                >Email Address</label
              >
              <div class="relative">
                <div
                  class="absolute inset-y-0 left-0 flex items-center pl-3 text-on-surface-variant"
                >
                  <span
                    class="material-symbols-outlined text-xl"
                    data-icon="mail"
                    >mail</span
                  >
                </div>
                <input
                  class="w-full pl-12 pr-4 py-3 bg-surface-container-low border-none rounded focus:ring-0 focus:bg-surface-container-highest focus:shadow-[0_0_0_1px_theme('colors.surface-tint')] transition-all font-body text-on-surface placeholder:text-outline-variant text-sm"
                  id="email"
                  name="email"
                  placeholder="請輸入電子郵件 / Enter Email"
                  required=""
                  type="email"
                />
              </div>
            </div>
            <!-- Action Buttons -->
            <div
              class="bg-surface-container-low px-8 py-5 flex justify-end items-center gap-4 -mx-8"
            >
              <button
                class="font-body text-sm font-medium text-on-surface-variant hover:text-error transition-colors px-4 py-2"
                onclick="goBackToPreviousPage()"
                type="button"
              >
                取消 / CANCEL
              </button>
              <button
                class="bg-primary text-on-primary font-body text-sm font-medium px-6 py-2.5 rounded transition-all hover:bg-primary-container hover:shadow-md"
                type="submit"
              >
                發送重設連結 / SEND RESET LINK
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
    <script>
      function goBackToPreviousPage() {
        if (window.history.length > 1) {
          window.history.back();
          return;
        }
        window.location.href = "../froggy_login/login.html";
      }
    </script>
  </body>
</html>
